# environment.yml — Conda environment definition
# Handles hardware-aware binary installation (PyTorch CPU/CUDA, Qiskit, etc.)
# pip cannot do this safely — conda resolves system-level deps correctly
#
# USAGE:
#   conda env create -f environment.yml
#   conda activate [project-name]
#   pip install -r requirements.txt   ← installs remaining pure-Python packages
#
# To update after changes:
#   conda env update -f environment.yml --prune
#
# To export your actual resolved env (for exact reproduction):
#   conda env export > environment.lock.yml

name: [project-name]   # FILL IN: replace with your project name

channels:
  - pytorch            # official PyTorch channel — correct CPU/CUDA binaries
  - conda-forge        # community packages, more up-to-date than defaults
  - defaults

dependencies:
  # === PYTHON ===
  - python=3.11        # 3.11 is the sweet spot: fast, stable, wide library support

  # === CORE SCIENTIFIC STACK ===
  # conda resolves these against your OS + CPU architecture correctly
  - numpy=1.26.4
  - scipy=1.13.0

  # === PYTORCH (CPU-only — safe default, no hidden CUDA pulls) ===
  # Comment this block and uncomment the CUDA block below if you get a GPU
  - pytorch::pytorch=2.3.0
  - pytorch::cpuonly          # explicit: prevents silent CUDA binary download

  # === PYTORCH (CUDA 12.1 — uncomment if you have NVIDIA GPU) ===
  # - pytorch::pytorch=2.3.0
  # - pytorch::pytorch-cuda=12.1

  # === BUILD TOOLS (required for some C-extension packages) ===
  - pip
  - setuptools
  - wheel
  - cmake                     # needed by some quantum/crypto packages
  - pkg-config

  # === DOMAIN-SPECIFIC (uncomment your domain) ===

  # --- QUANTUM ---
  # Note: Qiskit must come from pip (see requirements.txt)
  # PennyLane is pip-only too, but its lightning plugin needs cmake (above)

  # --- CYBERSECURITY ---
  # libsodium and openssl come from conda — pip's cryptography lib links to these
  # - openssl=3.3.0            # ensures cryptography package links to correct openssl
  # - libsodium                # for NaCl-based crypto operations

  # --- DATA SCIENCE ---
  # - polars=0.20.23           # faster in conda than pip for some platforms
  # - h5py                     # needed for large dataset storage — tricky to pip install

  # === PIP PACKAGES (everything conda can't handle well) ===
  - pip:
    # Core — always install
    - python-dotenv==1.0.1
    - pydantic==2.7.1
    - pyyaml==6.0.1
    - loguru==0.7.2
    - typer==0.12.3
    - rich==13.7.1             # pretty terminal output, used by typer

    # Testing
    - pytest==8.2.0
    - pytest-cov==5.0.0
    - mypy==1.10.0
    - ruff==0.4.4              # fast linter + formatter

    # Security scanning (run sast_check.sh after each module)
    - bandit==1.7.9            # Python SAST: finds injection, crypto, subprocess flaws
    - semgrep==1.75.0          # broader pattern-based SAST, great for crypto rules

    # Uncomment your domain stack — exact versions, no >=
    # See requirements.txt for full annotated list

    # --- QUANTUM ---
    # - pennylane==0.36.0
    # - pennylane-lightning==0.36.0
    # - qiskit==1.1.0
    # - qiskit-aer==0.14.2
    # - qiskit-ibm-runtime==0.23.0

    # --- CYBERSECURITY ---
    # - cryptography==42.0.7
    # - liboqs-python==0.10.1
    # - scapy==2.5.0

    # --- AI/ML ---
    # - transformers==4.41.0
    # - datasets==2.19.1
    # - scikit-learn==1.5.0
    # - mlflow==2.13.0

    # --- DATA SCIENCE ---
    # - polars==0.20.23
    # - dvc==3.51.1
    # - prefect==2.19.7
